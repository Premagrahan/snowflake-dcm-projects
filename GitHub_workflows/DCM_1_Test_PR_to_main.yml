name: ❄️ DCM - Test PR to main against STAGE and PROD

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["main"]     
    paths:
      - 'Quickstarts/**'      
    
  workflow_dispatch:
  
env:
  DCM_PROJECT_PATH: ${{ vars.DCM_PROJECT_PATH }}
  SNOWFLAKE_PASSWORD: ${{ secrets.DEPLOYER_PAT }}
  SNOWFLAKE_USER: ${{ vars.SNOWFLAKE_USER }}
  
jobs:
  STAGE_PLAN:
    runs-on: ubuntu-latest
    environment: DCM_STAGE
    steps:
    - name: Clone Repo
      uses: actions/checkout@v4
      
    - name: Read manifest target DCM_STAGE
      run: |
        MANIFEST_PATH="${{ env.DCM_PROJECT_PATH }}manifest.yml"
        echo "SNOWFLAKE_ACCOUNT=$(yq eval '.targets.DCM_STAGE.account_identifier' "$MANIFEST_PATH" | sed 's/"//g' | sed "s/'//g")" >> $GITHUB_ENV
        echo "SNOWFLAKE_ROLE=$(yq eval '.targets.DCM_STAGE.project_owner' "$MANIFEST_PATH" | sed 's/"//g' | sed "s/'//g")" >> $GITHUB_ENV
                
    - name: Setup SnowCLI
      run: pip install git+https://github.com/snowflakedb/snowflake-cli.git
      
    - name: Execute PLAN against STAGE and summarize output
      id: stage_plan
      run: |        
        cd ./$DCM_PROJECT_PATH
        snow dcm create --target DCM_STAGE --if-not-exists -x

        mkdir -p summary
        
        if snow dcm plan --target DCM_STAGE -x; then        
          echo "### ✅ DCM Plan to STAGE successful" >> $GITHUB_STEP_SUMMARY
          
          PLAN_METADATA_FILE="out/plan_output/plan_metadata.json"
          for OP_TYPE in CREATE ALTER DROP; do
            OP_COUNT=$(jq --arg OP_TYPE "$OP_TYPE" '.ddlChangeLog.operations[] | select(.operationType == $OP_TYPE)' "$PLAN_METADATA_FILE" | jq -s 'length')
            if [ "$OP_COUNT" -gt 0 ]; then
              echo "**${OP_TYPE} operations: $OP_COUNT**" >> $GITHUB_STEP_SUMMARY
              
              OBJECT_DOMAINS=$(jq -r --arg OP_TYPE "$OP_TYPE" '[.ddlChangeLog.operations[] | select(.operationType == $OP_TYPE) | .objectDomain // .association | select(. != null)] | unique | .[]' "$PLAN_METADATA_FILE")
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              for DOMAIN in $OBJECT_DOMAINS; do
                DOMAIN_COUNT=$(jq --arg OP_TYPE "$OP_TYPE" --arg DOMAIN "$DOMAIN" '.ddlChangeLog.operations[] | select(.operationType == $OP_TYPE and (.objectDomain // .association) == $DOMAIN)' "$PLAN_METADATA_FILE" | jq -s 'length')
                echo "- $DOMAIN: $DOMAIN_COUNT" >> $GITHUB_STEP_SUMMARY
              done
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            fi
          done
          
          cp $GITHUB_STEP_SUMMARY summary/stage-plan-summary.md
            
        else
          echo "### ❌ DCM Plan to STAGE failed" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          jq -r '.error' out/plan_output/plan_metadata.json >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          
          cp $GITHUB_STEP_SUMMARY summary/stage-plan-summary.md
          exit 1
        fi
    
    - name: Upload STAGE PLAN output
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: stage-plan-output
        path: ${{ env.DCM_PROJECT_PATH }}out/plan_output/plan_metadata.json

    - name: Upload STAGE PLAN Summary
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: stage-plan-summary
        path: ${{ env.DCM_PROJECT_PATH }}summary/stage-plan-summary.md

        
  PROD_PLAN:
    runs-on: ubuntu-latest
    environment: DCM_PROD_US
    steps:
    - name: Clone Repo
      uses: actions/checkout@v4

    - name: Read manifest target DCM_PROD_US
      run: |
        MANIFEST_PATH="${{ env.DCM_PROJECT_PATH }}manifest.yml"
        echo "SNOWFLAKE_ACCOUNT=$(yq eval '.targets.DCM_PROD_US.account_identifier' "$MANIFEST_PATH" | sed 's/"//g' | sed "s/'//g")" >> $GITHUB_ENV
        echo "SNOWFLAKE_ROLE=$(yq eval '.targets.DCM_PROD_US.project_owner' "$MANIFEST_PATH" | sed 's/"//g' | sed "s/'//g")" >> $GITHUB_ENV
        
    - name: Setup SnowCLI
      run: pip install git+https://github.com/snowflakedb/snowflake-cli.git
        
    - name: Execute PLAN against PROD and summarize output
      id: prod_plan
      run: |        
        cd ./$DCM_PROJECT_PATH
        snow dcm create --target DCM_PROD_US --if-not-exists -x

        mkdir -p summary
        
        if snow dcm plan --target DCM_PROD_US -x; then        
          echo "### ✅ DCM Plan to PROD successful" >> $GITHUB_STEP_SUMMARY
          
          PLAN_METADATA_FILE="out/plan_output/plan_metadata.json"
          for OP_TYPE in CREATE ALTER DROP; do
            OP_COUNT=$(jq --arg OP_TYPE "$OP_TYPE" '(.ddlChangeLog.operations[] | select(.operationType == $OP_TYPE)) | length' "$PLAN_METADATA_FILE" | wc -l)
            if [ "$OP_COUNT" -gt 0 ]; then
              echo "**${OP_TYPE} operations: $OP_COUNT**" >> $GITHUB_STEP_SUMMARY
              
              OBJECT_DOMAINS=$(jq -r --arg OP_TYPE "$OP_TYPE" '[.ddlChangeLog.operations[] | select(.operationType == $OP_TYPE) | .objectDomain // .association | select(. != null)] | unique | .[]' "$PLAN_METADATA_FILE")
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              for DOMAIN in $OBJECT_DOMAINS; do
                DOMAIN_COUNT=$(jq --arg OP_TYPE "$OP_TYPE" --arg DOMAIN "$DOMAIN" '.ddlChangeLog.operations[] | select(.operationType == $OP_TYPE and (.objectDomain // .association) == $DOMAIN)' "$PLAN_METADATA_FILE" | jq -s 'length')
                echo "- $DOMAIN: $DOMAIN_COUNT" >> $GITHUB_STEP_SUMMARY
              done
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            fi
          done
          
          cp $GITHUB_STEP_SUMMARY summary/prod-plan-summary.md
            
        else
          echo "### ❌ DCM Plan to PROD failed" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          jq -r '.error' out/plan_output/plan_metadata.json >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          
          cp $GITHUB_STEP_SUMMARY summary/prod-plan-summary.md
          exit 1
        fi
    
    - name: Upload PROD PLAN output
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: prod-plan-output
        path: ${{ env.DCM_PROJECT_PATH }}out/plan_output/plan_metadata.json

    - name: Upload PROD PLAN Summary
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: prod-plan-summary
        path: ${{ env.DCM_PROJECT_PATH }}summary/prod-plan-summary.md


  COMMENT_ON_PR:
    needs: [STAGE_PLAN, PROD_PLAN]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Download all summaries
        uses: actions/download-artifact@v4
        with:
          pattern: '*-summary'
          merge-multiple: true
        
      - name: Post Summary to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            const jobs = {
              'STAGE': { result: '${{ needs.STAGE_PLAN.result }}', file: 'stage-plan-summary.md' },
              'PROD': { result: '${{ needs.PROD_PLAN.result }}', file: 'prod-plan-summary.md' }
            };
            
            let comment = '### ❄️ DCM merge check\n\n';
            
            for (const [env, data] of Object.entries(jobs)) {
              try {
                comment += fs.readFileSync(data.file, 'utf8');
                comment += `---\n`;
              } 
              catch (error) {
                comment += `Could not retrieve summary. [View logs for details](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n`;
              }
            }
            
            comment += `🔎 [View full workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            
            if (context.eventName === 'pull_request') {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
